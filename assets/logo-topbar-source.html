<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Spline+Sans+Mono:wght@400;500&display=swap');
* { margin:0; padding:0; }
body { width:1024px; height:1024px; background:transparent; display:flex; align-items:center; justify-content:center; }
/* CHARCOAL + GOLD official badge — WHITE letters (Sam 2026-07-13) */
.disc { width:1000px; height:1000px; border-radius:50%;
  background: radial-gradient(circle at 50% 38%, #333b40 0%, #262d32 60%, #1c2226 100%);
  display:flex; align-items:center; justify-content:center; position:relative; }
.ring-outer { position:absolute; inset:22px; border:2px solid rgba(209,183,143,.6); border-radius:50%; }
.ring-inner { position:absolute; inset:40px; border:1px dashed rgba(209,183,143,.35); border-radius:50%; }
.stack { text-align:center; }
.line1 { font-family:'Instrument Serif', Georgia, serif; font-size:118px; line-height:1.04; color:#ffffff; }
.orn { display:flex; align-items:center; justify-content:center; gap:20px; margin:34px auto 30px; }
.orn .bar { width:140px; height:1.5px; background:rgba(209,183,143,.45); }
.orn .star { color:#d1b78f; font-size:30px; line-height:1; }
.sub { font-family:'Spline Sans Mono', monospace; font-size:27px; letter-spacing:.5em; text-indent:.5em; color:#ffffff; }
.est { font-family:'Spline Sans Mono', monospace; font-size:20px; letter-spacing:.34em; text-indent:.34em; color:#ffffff; margin-top:26px; }
</style>
<div class="disc">
  <div class="ring-outer"></div>
  <div class="ring-inner"></div>
  <div class="stack">
    <div class="line1">The Parrish<br>Foundation</div>
    <div class="orn"><div class="bar"></div><div class="star">✦</div><div class="bar"></div></div>
    <div class="sub">BUILT TO GIVE</div>
    <div class="est">EST. 2026</div>
  </div>
</div>
