[build]
  publish = "."

# the netlify.app subdomain permanently redirects to the real domain
[[redirects]]
  from = "https://theparrishfoundation.netlify.app/*"
  to = "https://theparrishfoundation.org/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
